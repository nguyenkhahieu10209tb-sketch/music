<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoNhayChuan Pro</title>
    <style>
        /* ========== RESET & BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 165, 0, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 50, 50, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(0, 150, 255, 0.15) 0%, transparent 40%);
            animation: auraShift 25s ease-in-out infinite alternate;
            filter: blur(30px);
            pointer-events: none;
        }
        @keyframes auraShift {
            0% {
                transform: translate(-5%, -5%) scale(1);
            }
            25% {
                transform: translate(5%, 0%) scale(1.1);
            }
            50% {
                transform: translate(0%, 5%) scale(0.9);
            }
            75% {
                transform: translate(-5%, 0%) scale(1.05);
            }
            100% {
                transform: translate(5%, -5%) scale(1);
            }
        }
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* ========== CONTAINER ========== */
        .container {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(18px) saturate(1.8);
            -webkit-backdrop-filter: blur(18px) saturate(1.8);
            border-radius: 48px;
            padding: 28px 24px;
            width: 100%;
            max-width: 540px;
            min-width: 320px;
            border: 2px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 80px rgba(255, 165, 0, 0.15);
            position: relative;
            z-index: 2;
            max-height: 96vh;
            overflow-y: auto;
        }

        /* ========== HEADER ========== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .app-header .title {
            color: #fff;
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff8c00, #ff2d55, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 165, 0, 0.4);
            user-select: none;
            white-space: nowrap;
        }
        .app-header .heroes {
            display: flex;
            gap: 4px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            flex-shrink: 0;
        }
        .heroes span {
            padding: 2px 6px;
            border-radius: 30px;
        }
        .heroes .naruto {
            color: #ff8c00;
        }
        .heroes .goku {
            color: #ff2d55;
        }
        .heroes .luffy {
            color: #00bfff;
        }

        .app-sub {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-bottom: 16px;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.15);
            padding-bottom: 12px;
        }
        .pro-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0a0a1a;
            font-weight: 800;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 11px;
            margin-left: 8px;
            vertical-align: middle;
        }
        .pro-badge.free {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* ========== TABS ========== */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1 1 auto;
            padding: 10px 6px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            min-width: 60px;
        }
        .tab-btn.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: #ff8c00;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.1);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* ========== INPUTS & BUTTONS ========== */
        input,
        button {
            width: 100%;
            padding: 14px 16px;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            margin-top: 8px;
            transition: 0.3s;
        }
        input {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        input:focus {
            border-color: #ff8c00;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff8c00, #ff2d55);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(255, 44, 85, 0.4);
        }
        .btn-primary:active {
            transform: scale(0.96);
        }
        .error {
            color: #ff6b6b;
            display: none;
            margin-top: 8px;
            font-size: 14px;
            text-align: center;
        }

        /* ========== DEVICE LIST ========== */
        .device-list {
            min-height: 180px;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 4px;
            margin-top: 8px;
        }
        .device-list::-webkit-scrollbar {
            width: 4px;
        }
        .device-list::-webkit-scrollbar-thumb {
            background: #ff8c00;
            border-radius: 10px;
        }

        .device-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 14px 18px;
            border-radius: 18px;
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 215, 0, 0.08);
            cursor: pointer;
            transition: 0.2s;
        }
        .device-item:active {
            background: rgba(255, 215, 0, 0.12);
            transform: scale(0.97);
        }
        .device-item .name {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }
        .device-item .arrow {
            color: #ff8c00;
            font-size: 20px;
        }

        /* ========== DETAIL CARD ========== */
        .detail-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 18px;
            margin-top: 10px;
            border: 1px solid rgba(255, 215, 0, 0.12);
        }
        .detail-card .model {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }
        .detail-card .sub {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-bottom: 12px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-row .label {
            color: rgba(255, 255, 255, 0.65);
            font-size: 14px;
        }
        .detail-row .value {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
        }
        .value.gold {
            color: #ffd700;
        }
        .value.blue {
            color: #00bfff;
        }
        .value.red {
            color: #ff2d55;
        }
        .value.green {
            color: #55efc4;
        }

        .back-btn {
            background: none;
            border: none;
            color: #ff8c00;
            font-size: 15px;
            padding: 6px 0;
            cursor: pointer;
            font-weight: 600;
        }
        .hidden {
            display: none;
        }

        /* ========== TOGGLES ========== */
        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 8px;
            gap: 10px;
        }
        .toggle-item .label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            font-weight: 500;
        }
        .toggle-item .desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
        }
        .switch {
            position: relative;
            width: 50px;
            height: 28px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .switch.active {
            background: linear-gradient(135deg, #ff8c00, #ff2d55);
        }
        .switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            transition: 0.3s;
        }
        .switch.active::after {
            left: 25px;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .status-badge.on {
            background: #55efc4;
            color: #0a0a1a;
        }
        .status-badge.off {
            background: #ff6b6b;
            color: #fff;
        }

        /* ========== PRO CARD ========== */
        .pro-card {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 24px;
            padding: 20px;
            margin-top: 10px;
            text-align: center;
        }
        .pro-card .price {
            font-size: 32px;
            font-weight: 900;
            color: #ffd700;
        }
        .pro-card .sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin: 8px 0;
        }
        .bank-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 14px;
            margin: 12px 0;
            text-align: left;
        }
        .bank-info .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
        .bank-info .row .label {
            color: rgba(255, 255, 255, 0.4);
        }
        .bank-info .row .value {
            color: #fff;
            font-weight: 600;
        }
        .qr-placeholder {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin: 12px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .qr-placeholder img {
            max-width: 180px;
            border-radius: 12px;
            border: 2px solid rgba(255, 215, 0, 0.2);
        }
        .qr-placeholder .hint {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 8px;
        }
        .pro-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0;
        }
        .pro-feature {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 10px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 215, 0, 0.06);
        }
        .pro-feature .icon {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }
        .btn-pro {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0a0a1a;
            font-weight: 800;
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: 0.3s;
            box-shadow: 0 8px 28px rgba(255, 215, 0, 0.3);
        }
        .btn-pro:active {
            transform: scale(0.96);
        }

        /* ========== NOTIFICATION ========== */
        .notification {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 14px;
            max-width: 90%;
            z-index: 999;
            display: none;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }
        .notification.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ========== DEVICE SELECTOR & SEARCH ========== */
        .device-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .device-type-btn {
            flex: 1;
            padding: 12px 0;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .device-type-btn.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: #ff8c00;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.1);
        }
        #searchInput {
            margin-top: 4px;
            padding: 12px 16px;
            width: 100%;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 215, 0, 0.2);
            font-size: 14px;
        }
        #searchInput::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        #searchInput:focus {
            outline: none;
            border-color: #ff8c00;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 10px;
            margin-top: 16px;
            border-top: 1px solid rgba(255, 215, 0, 0.08);
            padding-top: 12px;
        }
    </style>
</head>

    <!-- ===== SAO NỀN ===== -->
    <div class="stars" id="starfield"></div>

    <!-- ===== CONTAINER CHÍNH ===== -->
    <div class="container" id="app">
        <!-- HEADER -->
        <div class="app-header">
            <span class="title" id="appTitle">DoNhayChuan <span class="pro-badge free" id="proBadge">FREE</span></span>

        <!-- MÀN HÌNH LOGIN -->
        <div id="loginScreen">
            <input type="password" id="passwordInput" placeholder="🔑 Nhập mật khẩu ứng dụng..." autocomplete="off">
            <button class="btn-primary" id="loginBtn">Mở khóa</button>
            <div class="error" id="loginError">❌ Sai mật khẩu, thử lại!</div>

        <!-- ỨNG DỤNG CHÍNH -->

            <!-- TABS -->
            <div class="tabs">
                <div class="tab-btn active" data-tab="sensitivity">📊 Độ nhạy</div>

                <div class="tab-btn" data-tab="pro">🌟 Pro</div>

            <!-- TAB ĐỘ NHẠY -->
            <div id="tab-sensitivity" class="tab-content active">
                <div class="device-selector">
                    <button class="device-type-btn active" data-type="iphone">📱 iPhone</button>
                    <button class="device-type-btn" data-type="android">🤖 Android</button>
                </div>
                <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm máy (ví dụ: Galaxy S24, Xiaomi 14, ...)" autocomplete="off">
                <div id="listView" class="device-list"></div>
                <div id="detailView" class="hidden">
                    <button class="back-btn" id="backBtn">‹ Quay lại</button>
                    <div class="detail-card" id="detailCard"></div>

            <!-- TAB TỐI ƯU -->

                <div id="toggleContainer"></div>
                <div style="margin-top:12px; color:rgba(255,255,255,0.3); font-size:11px; text-align:center;">* Các tính năng được áp dụng ngay khi bật</div>
            </div>

            <!-- TAB PRO -->
            <div id="tab-pro" class="tab-content">
                <div id="proContent"></div>
            </div>
        </div>

        <div class="footer">⛩️ DoNhayChuan · v5.0 · 2025</div>
    </div>

    <!-- THÔNG BÁO -->
    <div class="notification" id="notification"></div>

    <script>

        // 1. SAO NỀN
        // ============================================================
        (function createStars() {

            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const s = Math.random() * 4 + 2;
                star.style.width = s + 'px';
                star.style.height = s + 'px';
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';

        function calcSensitivity(screen, ram, perf) {
            let base = 50 + (screen * 8) + (ram * 4) + (perf / 380);
            let general = Math.min(200, Math.max(50, Math.round(base)));
            return {
                general: general,
                redDot: Math.min(200, general + 8),
                twoX: Math.min(200, general - 2),
                fourX: Math.min(200, general - 12),
                sniper: Math.min(200, general - 20),
                dpi: Math.min(240, Math.max(120, Math.round(140 + screen * 6))),
                fire: Math.min(60, Math.max(28, 60 - Math.round(screen * 2.5)))
            };
        }
