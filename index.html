<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Clip Phát Nhạc</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; padding-top: 50px; }
        .btn { display: inline-block; padding: 15px 30px; background: #00adb5; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 18px; margin: 20px 0; cursor: pointer; border: none; }
        #click-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; font-size: 22px; z-index: 9999; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Màn hình chờ để lách luật phát nhạc của trình duyệt -->
    <div id="click-screen">Chạm vào màn hình để mở Clip có Nhạc!</div>

    <h1>Dự Án Web Clip Của Bạn</h1>
    <p>Bấm nút bên dưới để cài đặt ứng dụng này ra màn hình chính:</p>

    <!-- Nút kích hoạt tải file cấu hình cấu hình thiết bị -->
    <button class="btn" onclick="downloadProfile()">CÀI ĐẶT APP RA MÀN HÌNH</button>

    <!-- File nhạc nền của mày -->
    <audio id="bg-music" loop>
        <source src="<source src="ScreenRecording_07-02-2026 21-47-57_1 (online-audio-converter.com) 2.mp3" type="audio/mpeg">
" type="audio/mpeg">
    </audio>

    <script>
        // Xử lý phát nhạc khi người dùng chạm màn hình lần đầu
        const clickScreen = document.getElementById('click-screen');
        const audio = document.getElementById('bg-music');
        
        clickScreen.addEventListener('click', () => {
            audio.play().catch(e => console.log(e));
            clickScreen.style.display = 'none';
        });

        // Hàm tự động tạo và tải file .mobileconfig trực tiếp trên điện thoại
        function downloadProfile() {
            const domain = window.location.origin;
            const profileXml = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>PayloadContent</key>
    <array>
        <dict>
            <key>Label</key>
            <string>Độ Nhạy Chuẩn</string>
            <key>URL</key>
            <string>${domain}</string>
            <key>IsRemovable</key>
            <true/>
            <key>PayloadDescription</key>
            <string>Cài đặt Web Clip lối tắt</string>
            <key>PayloadDisplayName</key>
            <string>Độ Nhạy Chuẩn</string>
            <key>PayloadIdentifier</key>
            <string>com.bohieuday.webclip</string>
            <key>PayloadType</key>
            <string>com.apple.webclip.managed</string>
            <key>PayloadUUID</key>
            <string>c1afd904-c43d-47a2-be12-05810208b520</string>
            <key>PayloadVersion</key>
            <integer>1</integer>
        </dict>
    </array>
    <key>PayloadDisplayName</key>
    <string>Cấu hình cài đặt App Web</string>
    <key>PayloadIdentifier</key>
    <string>com.bohieuday.profile</string>
    <key>PayloadType</key>
    <string>Configuration</string>
    <key>PayloadUUID</key>
    <string>a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d</string>
    <key>PayloadVersion</key>
    <integer>1</integer>
</dict>
</plist>`;

            const blob = new Blob([profileXml], { type: 'application/x-apple-aspen-config' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'app.mobileconfig';
            link.click();
        }
    </script>
</body>
</html>
