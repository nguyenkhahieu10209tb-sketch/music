<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#070712">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI SENS PRO">
    <link rel="apple-touch-icon" href="image.png">
    <title>AI CONFIG - ULTIMATE SENSITIVITY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-red: #ff3366;
            --neon-cyan: #00f3ff;
            --neon-gold: #ffcc00;
            --dark-bg: #070712;
            --panel-bg: rgba(18, 18, 36, 0.7);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Roboto, sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        /* Sửa lỗi tràn UI trên tai thỏ iOS/Android */
        body { 
            background: var(--dark-bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
        }
        .bg-matrix { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #070712 100%); overflow: hidden; }
        .bg-matrix::before { content: ""; position: absolute; width: 200%; height: 200%; background: repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(0, 243, 255, 0.03) 4px, rgba(0, 243, 255, 0.03) 5px); animation: scan 10s linear infinite; }
        @keyframes scan { 0% { transform: translateY(-50%); } 100% { transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #install-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10001; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .install-box { background: rgba(18, 18, 36, 0.95); border: 2px solid var(--neon-cyan); border-radius: 20px; padding: 30px 20px; text-align: center; width: 90%; max-width: 400px; }
        .install-box h3 { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,243,255,0.5); margin-bottom: 10px; }
        .install-box p { color: #8a8a9e; font-size: 14px; margin: 15px 0; }

        #login-app { position: fixed; inset: 0; background: #070712; z-index: 9999; display: none; align-items: center; justify-content: center; }
        .login-box { background: var(--panel-bg); border: 1px solid var(--neon-cyan); padding: 40px 25px; border-radius: 20px; text-align: center; width: 90%; max-width: 380px; backdrop-filter: blur(10px); }
        .login-box h2 { color: var(--neon-cyan); margin-bottom: 5px; font-weight: 800; }
        .cyber-input { width: 100%; padding: 15px; background: #05050a; border: 1px solid rgba(255,255,255,0.1); color: #00f3ff; font-size: 16px; border-radius: 12px; text-align: center; outline: none; margin: 20px 0; letter-spacing: 2px; }
        .cyber-btn { width: 100%; padding: 16px; background: linear-gradient(90deg, #00f3ff, #0088ff); border: none; border-radius: 12px; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .cyber-btn:disabled { filter: grayscale(100%); cursor: not-allowed; opacity: 0.6; }
        .btn-gold { background: linear-gradient(90deg, #ffcc00, #ff6600); color: #000; }
        .btn-red { background: linear-gradient(90deg, #ff3366, #cc0033); }

        /* Đã vá lỗi class cyber-select thiếu CSS */
        .cyber-select { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(5, 5, 10, 0.9); color: #fff; border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 10px; outline: none; font-weight: bold; }
        .cyber-select:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,243,255,0.2); }

        #main-ui { display: none; width: 100%; height: 100%; flex-direction: column; padding: 20px; overflow-y: auto; padding-bottom: 80px; }
        .header h1 { font-size: 22px; color: var(--neon-cyan); text-align: center; margin: 10px 0; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; color: #8a8a9e; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; }
        .tab-btn.active { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,243,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeUp 0.3s; }
        
        .glass-panel { background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(12px); }
        .panel-title { font-size: 14px; font-weight: bold; color: var(--neon-cyan); margin-bottom: 15px; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .status-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; text-align: center; }
        
        .result-box { display: none; background: rgba(0,243,255,0.05); border: 1px dashed var(--neon-cyan); border-radius: 12px; padding: 15px; margin-top: 15px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .stat-val { color: var(--neon-gold); font-weight: bold; }
        .stat-pro { color: var(--neon-red); font-style: italic; font-size: 12px; cursor: pointer; }
        .badge-pro { background: var(--neon-red); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        
        .pro-banner { background: linear-gradient(45deg, rgba(255,51,102,0.1), rgba(255,204,0,0.1)); border: 1px solid var(--neon-gold); padding: 20px; border-radius: 16px; text-align: center; }
        .qr-code { width: 160px; height: 160px; border-radius: 10px; border: 2px solid var(--neon-cyan); margin: 10px auto; display: block; object-fit: cover; }
        
        .toggle-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 6px; }
        /* Vá lỗi CSS Toggles giật/đơ */
        .switch { width: 46px; height: 24px; background: rgba(255,255,255,0.15); border-radius: 12px; cursor: pointer; position: relative; transition: background-color 0.3s; }
        .switch.active { background: var(--neon-cyan); }
        .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); }
        .switch.active::after { transform: translateX(22px); }
        
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
        .status-badge.on { background: #00ffaa; color: #000; }
        .status-badge.off { background: var(--neon-red); color: #fff; }
        
        .device-item { background: rgba(255,255,255,0.03); padding: 12px 16px; border-radius: 12px; margin: 4px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .device-item:active { background: rgba(0,243,255,0.1); }
        .device-type-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #8a8a9e; font-weight: bold; cursor: pointer; margin: 2px; }
        .device-type-btn.active { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 1px solid var(--neon-cyan); color: #fff; padding: 12px 24px; border-radius: 20px; z-index: 10002; font-size: 14px; display: none; font-weight: bold; }
        .toast.show { display: block; animation: fadeUp 0.3s; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"><\/script>
</head>

<script>
// CƠ SỞ DỮ LIỆU ĐÃ ĐƯỢC LỌC XSS (Sử dụng textContent khi render)
const iphoneDevices = [
    { name: "iPhone 11 / 11 Pro", screen: 6.1, ram: 4, perf: 4800, refresh: 60 },
    { name: "iPhone 12 Pro Max", screen: 6.7, ram: 6, perf: 5600, refresh: 60 },
    { name: "iPhone 13 Pro / Max", screen: 6.7, ram: 6, perf: 6000, refresh: 120 },
    { name: "iPhone 14 Pro Max", screen: 6.7, ram: 6, perf: 6400, refresh: 120 },
    { name: "iPhone 15 Pro Max", screen: 6.7, ram: 8, perf: 7000, refresh: 120 },
    { name: "iPhone 16 Pro Max", screen: 6.9, ram: 8, perf: 7600, refresh: 120 }
];

const androidDevices = [
    { name: "Samsung S23 Ultra", screen: 6.8, ram: 12, perf: 7200, refresh: 120 },
    { name: "Samsung S24 Ultra", screen: 6.8, ram: 12, perf: 7800, refresh: 120 },
    { name: "Xiaomi Redmi Note 12", screen: 6.67, ram: 4, perf: 3200, refresh: 120 },
    { name: "POCO F5 Pro", screen: 6.67, ram: 8, perf: 5800, refresh: 120 },
    { name: "ROG Phone 7", screen: 6.78, ram: 16, perf: 8500, refresh: 165 }
];

// BIẾN HỆ THỐNG
const APP_PASS = "bohieudaycon209";
const SECRET_KEY = "HIEU_PRO_2024_SECRET_X";
let isPro = false;
let currentConfigData = "";
let currentDeviceType = 'iphone', deviceSearchText = '';
let filteredDevices = [];
let musicPlaying = false;
let searchTimeout = null;

// QUẢN LÝ TOGGLES 
const toggleData = [
    { id: 'fixrung', label: 'Cân bằng Tâm', desc: 'Giảm rung chấn giật dọc khi sấy đạn', pro: false },
    { id: 'giamlo', label: 'Ghìm đầu đạn', desc: 'Hạn chế đạn bay lố qua đầu mục tiêu', pro: false },
    { id: 'nhetam', label: 'Giảm ma sát', desc: 'Tăng tốc độ kéo vuốt trên màn hình', pro: false },
    { id: 'damtam', label: 'Aimlock Assist', desc: 'Ghim chặt hồng tâm vào thân địch', pro: true },
    { id: 'tangfps', label: 'Bypass FPS', desc: 'Mở khóa khung hình tối đa của màn hình', pro: true },
    { id: 'camung', label: 'Hyper Touch', desc: 'Ép xung tần số lấy mẫu điểm chạm', pro: true }
];

// Khởi tạo an toàn (try...catch bọc JSON)
let toggleStates = {};
try { toggleStates = JSON.parse(localStorage.getItem('toggleStates')) || {}; } catch(e) { toggleStates = {}; }
toggleData.forEach(t => { if (toggleStates[t.id] === undefined) toggleStates[t.id] = false; });

// THUẬT TOÁN MÃ HÓA (Đã vá lỗi Hash Collision bằng 16 char)
function generateDeviceId() {
    let fp = [navigator.userAgent, screen.width, screen.height, window.devicePixelRatio, navigator.hardwareConcurrency].join('|');
    return CryptoJS.SHA256(fp).toString().substring(0, 16).toUpperCase();
}

function checkProStatus() {
    if (localStorage.getItem('is_pro_user') === 'true') isPro = true;
    return isPro;
}

function activatePro() {
    const code = document.getElementById('activation-code').value.trim().toUpperCase();
    const deviceId = generateDeviceId();
    const expected = CryptoJS.SHA256(deviceId + SECRET_KEY).toString().substring(0, 16).toUpperCase();
    
    if (code === expected) {
        localStorage.setItem('is_pro_user', 'true');
        isPro = true;
        updateProUI();
        renderToggles(); // Mở khóa các nút xám
        showToast('KÍCH HOẠT PRO THÀNH CÔNG!');
    } else {
        alert('Mã kích hoạt không đúng hoặc không dành cho máy này!');
    }
}

// Đã vá lỗi logic kẹt nút Xuất File
function updateProUI() {
    const btnGen = document.getElementById('btn-gen-config');
    if (isPro) {
        document.getElementById('pro-buy-panel').style.display = 'none';
        document.getElementById('pro-active-panel').style.display = 'block';
        document.getElementById('vip-indicator').style.display = 'inline-block';
        if(btnGen && document.getElementById('ai-result').style.display === 'block') btnGen.style.display = 'block';
    } else {
        if(btnGen) btnGen.style.display = 'none';
    }
}

function switchTab(idx) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));

function gameChanged() {

    document.getElementById('ai-result').style.display = 'none';

// RENDER TOGGLES (Chuẩn UI không bị giật)
function renderToggles() {
    const container = document.getElementById('toggleContainer');
    // Sinh HTML 1 lần, loại bỏ onclick rỗng gây lỗi iOS
    container.innerHTML = toggleData.map(t => {
        const locked = t.pro && !isPro;
        return `<div class="toggle-item" style="opacity:${locked ? 0.5 : 1}">
            <div>
                <span style="font-size:13px; font-weight:bold; color:#fff;">${t.label}</span> ${locked?'<span style="font-size:10px">🔒</span>':''}
                <span class="status-badge ${toggleStates[t.id] ? 'on' : 'off'}">${toggleStates[t.id] ? 'BẬT' : 'TẮT'}</span>
                <div style="font-size:11px; color:#8a8a9e; margin-top:3px;">${t.desc}</div>
            </div>
            <div id="sw-${t.id}" class="switch ${toggleStates[t.id] && !locked ? 'active' : ''}"></div>
        </div>`;
    }).join('');

    // Gán Event Listener an toàn
    toggleData.forEach(t => {
        const sw = document.getElementById(`sw-${t.id}`);
        sw.addEventListener('click', () => {
            if (t.pro && !isPro) { showToast('Tính năng này cần kích hoạt gói PRO!'); return; }
            toggleStates[t.id] = !toggleStates[t.id];
            localStorage.setItem('toggleStates', JSON.stringify(toggleStates));
            
            // Chỉ đổi class và text, KHÔNG render lại toàn bộ khối
            sw.classList.toggle('active', toggleStates[t.id]);
            const badge = sw.parentNode.querySelector('.status-badge');
            if(badge) {
                badge.textContent = toggleStates[t.id] ? 'BẬT' : 'TẮT';
                badge.className = `status-badge ${toggleStates[t.id] ? 'on' : 'off'}`;
            }
        });
    });
}

// KIỂM TRA MẠNG (Đã vá lỗi Spam Fetch)
function checkNetwork() {
    const btn = document.getElementById('btn-ping');
    const el = document.getElementById('ping-value');
    if(btn.disabled) return;
    
    btn.disabled = true;
    el.textContent = 'Đang đo...';
    el.style.color = '#fff';
    
    const start = performance.now();
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 4000);

    fetch('https://cloudflare-dns.com/dns-query', { mode: 'no-cors', signal: controller.signal })
    .then(() => {
        clearTimeout(timeoutId);
        const ping = Math.round(performance.now() - start);
        el.textContent = ping + ' ms';
        el.style.color = ping < 60 ? '#00ffaa' : (ping < 120 ? '#ffcc00' : '#ff3366');
    }).catch(() => {
        el.textContent = 'Mất kết nối'; el.style.color = '#ff3366';
    }).finally(() => {
        btn.disabled = false;
    });
}

// THUẬT TOÁN AI (Đã kết nối hoàn toàn với Toggles)
function calculateAI() {
    const game = document.getElementById('game-select').value;
    if (!isPro && game !== 'ff') { alert('Phân tích cho PUBG/Liên Quân yêu cầu quyền VIP PRO!'); return; }
    
    document.getElementById('ai-result').style.display = 'block';
    document.getElementById('btn-launch-game').style.display = 'block';
    if(isPro) document.getElementById('btn-gen-config').style.display = 'block';

    // Tính toán ma trận
    let baseSens = 120;
    if (toggleStates['camung']) baseSens += 28; // Siêu cảm ứng cộng nhiều điểm chạm
    if (toggleStates['fixrung']) baseSens -= 5;  // Cân bằng lại hãm độ nảy
    if (toggleStates['nhetam']) baseSens += 10;
    if (toggleStates['damtam']) baseSens -= 8;

    if (game === 'ff') {
        let red = baseSens + 12;
        let scope = baseSens - 15;
        document.getElementById('result-content').innerHTML = `
            <div class="stat-row"><span>🎯 Nhìn xung quanh:</span><span class="stat-val">${Math.min(200, baseSens)}</span></div>
            <div class="stat-row"><span>🔴 Red Dot:</span><span class="stat-val">${Math.min(200, red)}</span></div>
            <div class="stat-row"><span>🔭 Ống ngắm 2x:</span><span class="stat-val">${Math.max(50, scope)}</span></div>
            <div class="stat-row"><span>🔭 Ống ngắm 4x:</span><span class="stat-val">${Math.max(50, scope - 10)}</span></div>`;
        
        // Xuất file cấu hình chuẩn Windows (\r\n)
        currentConfigData = `[FREE_FIRE_INJECT_CONFIG]\r\nGENERAL=${Math.min(200, baseSens)}\r\nRED_DOT=${Math.min(200, red)}\r\nSCOPE_2X=${Math.max(50, scope)}\r\nSCOPE_4X=${Math.max(50, scope-10)}\r\n`;
        currentConfigData += `ANTI_SHAKE=${toggleStates['fixrung']?1:0}\r\nHEADSHOT_FIX=${toggleStates['giamlo']?1:0}\r\nAIMLOCK=${toggleStates['damtam']?1:0}\r\nMAX_FPS=${toggleStates['tangfps']?1:0}\r\n`;
    } else if (game === 'pubg') {
        document.getElementById('result-content').innerHTML = `<div class="stat-row"><span>Camera:</span><span class="stat-val">${baseSens - 30}</span></div><div class="stat-row"><span>ADS (Ghìm tâm):</span><span class="stat-val">${baseSens - 15}</span></div>`;
        currentConfigData = `[PUBG_PRO_CFG]\r\nCAMERA=${baseSens-30}\r\nADS=${baseSens-15}`;
    } else {
        document.getElementById('result-content').innerHTML = `<div class="stat-row"><span>Tốc độ xoay Camera:</span><span class="stat-val">${baseSens - 40}</span></div>`;
        currentConfigData = `[LIENQUAN_PRO]\r\nCAM_SPEED=${baseSens-40}`;
    }

    if (isPro) {
        document.getElementById('res-dpi').textContent = (390 + (toggleStates['camung']?70:0)) + " DPI";
        document.getElementById('res-btn').textContent = "43% (Hiển thị)"; 
    } else {
        document.getElementById('res-dpi').innerHTML = '<span class="stat-pro" onclick="switchTab(3)">Khóa 🔒 (Mua PRO)</span>';
        document.getElementById('res-btn').innerHTML = '<span class="stat-pro" onclick="switchTab(3)">Khóa 🔒 (Mua PRO)</span>';
    }
}

function exportConfig() {
    if (!currentConfigData) return;
    const blob = new Blob([currentConfigData], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Sens_Config.cfg'; a.click();
    showToast('Đã tải File .CFG xuống thiết bị!');
}

// MỞ GAME AN TOÀN TRÊN iOS/ANDROID
function launchGame() {
    const game = document.getElementById('game-select').value;
    const urls = { ff: 'freefire://', pubg: 'pubgmobile://', lq: 'lienquan://' };
    
    // Tạo thẻ a ẩn, kích hoạt qua blank để lách Sandbox iOS
    const a = document.createElement('a');
    a.href = urls[game];
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    
    showToast(`Đã gửi lệnh gọi hệ thống mở Trò chơi!`);
}

// DANH SÁCH THIẾT BỊ (Đã Debounce chống giật và lọc XSS)
function renderDeviceList() {
    const source = currentDeviceType === 'iphone' ? iphoneDevices : androidDevices;
    // Chống XSS bằng textContent khi cần, nhưng array ở đây là an toàn.
    filteredDevices = source.filter(d => d.name.toLowerCase().includes(deviceSearchText.toLowerCase()));
    const container = document.getElementById('deviceListView');
    
    if (!filteredDevices.length) { 
        container.innerHTML = '<div style="color:#8a8a9e; text-align:center; padding:20px;">Không tìm thấy máy phù hợp</div>'; 
        return; 
    }
    
    container.innerHTML = '';
    filteredDevices.forEach((d, i) => {
        const div = document.createElement('div');
        div.className = 'device-item';
        div.onclick = () => showDeviceDetail(i);
        div.innerHTML = `<span></span><span style="color:var(--neon-cyan)">›</span>`;
        div.firstChild.textContent = d.name; // Gán an toàn tuyệt đối
        container.appendChild(div);
    });
}

// Đã vá lỗi sự kiện bong bóng (Event Bubbling) khi bấm chữ Mua PRO
function showDeviceDetail(index) {
    if(!filteredDevices[index]) return;
    const d = filteredDevices[index];
    
    let fixFactor = d.refresh === 120 ? 15 : (d.refresh > 120 ? 25 : 0);
    let base = Math.min(190, Math.max(60, Math.round(200 - (d.perf / 50) + fixFactor)));

    const card = document.getElementById('deviceDetailCard');
    card.innerHTML = `
        <div style="font-size:18px; color:var(--neon-cyan); margin-bottom:10px; font-weight:bold;"></div>
        <div style="color:#8a8a9e; margin-bottom:12px; font-size:13px;">Màn hình: ${d.screen}″ · Ram: ${d.ram}GB · Tần số quét: ${d.refresh}Hz</div>
        <div class="stat-row"><span>🎯 Lực kéo chung:</span><span class="stat-val">${base}%</span></div>
        <div class="stat-row"><span>🔴 Red Dot:</span><span class="stat-val">${base + 8}%</span></div>
        <div class="stat-row"><span>🔭 Ống ngắm 2x:</span><span class="stat-val">${base - 4}%</span></div>
        <div class="stat-row"><span>🔭 Ống ngắm 4x:</span><span class="stat-val">${base - 14}%</span></div>
        ${isPro ? `
        <div class="stat-row"><span>🖱️ Tối ưu DPI:</span><span class="stat-val">${Math.round(410 + (d.screen*12))}</span></div>
        <div class="stat-row"><span>👆 Size nút bắn:</span><span class="stat-val">${Math.round(65 - (d.screen*2))}%</span></div>` : `
        <div class="stat-row"><span>🖱️ Tối ưu DPI:</span><span class="stat-pro pro-trigger">Khóa 🔒 (Mua PRO)</span></div>
        <div class="stat-row"><span>👆 Size nút bắn:</span><span class="stat-pro pro-trigger">Khóa 🔒 (Mua PRO)</span></div>`}
    `;
    card.firstChild.nextSibling.textContent = d.name; // Tên máy an toàn

    // Gán event tắt bong bóng
    card.querySelectorAll('.pro-trigger').forEach(el => {
        el.onclick = (e) => { e.stopPropagation(); switchTab(3); };
    });

    document.getElementById('deviceListView').style.display = 'none';
    document.getElementById('deviceDetailView').style.display = 'block';
}

function showDeviceList() {
    document.getElementById('deviceListView').style.display = 'block';
    document.getElementById('deviceDetailView').style.display = 'none'; // Vá lỗi đè UI
}

document.getElementById('searchDevice').addEventListener('input', function() {
    clearTimeout(searchTimeout);
    deviceSearchText = this.value;
    searchTimeout = setTimeout(() => { renderDeviceList(); }, 200); // Debounce
});

document.querySelectorAll('.device-type-btn').forEach(b => b.addEventListener('click', function() {
    document.querySelectorAll('.device-type-btn').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    currentDeviceType = this.dataset.type;
    showDeviceList();
    renderDeviceList();
}));

// AUDIO & BACKGROUND SYNC (Đã vá lỗi nhạc ma)
function toggleMusic() {
    const bg = document.getElementById('bg-music');
    const btn = document.getElementById('btn-music');
    const st = document.getElementById('music-status');
    
    if (musicPlaying) { 
        bg.pause(); 
        btn.innerHTML = '<i class="fa-solid fa-play"></i> BẬT NHẠC'; 
        st.textContent = "Đang tắt"; st.style.color = "#8a8a9e";
    } else { 
        bg.play().catch(() => { showToast('Trình duyệt từ chối tự động phát nhạc!'); }); 
        btn.innerHTML = '<i class="fa-solid fa-pause"></i> TẮT NHẠC'; 
        st.textContent = "Đang phát 🎵"; st.style.color = "#00ffaa";
    }
    musicPlaying = !musicPlaying;
}

// Xử lý tự dừng nhạc khi ra màn hình chính điện thoại
document.addEventListener("visibilitychange", () => {
    const bg = document.getElementById('bg-music');
    if (document.hidden && musicPlaying) { bg.pause(); } 
    else if (!document.hidden && musicPlaying) { bg.play().catch(()=>{}); }
});

function simulateBoost() { 
    showToast(isPro ? "HỆ THỐNG PRO: Đã giải phóng RAM và ép xung luồng xử lý!" : "BẢN FREE: Vui lòng nâng cấp VIP PRO để mở khóa luồng!"); 
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg; 
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); }, 2500);
}

// BẮT SỰ KIỆN PWA CÀI ĐẶT
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
});

function setupInstallButton() {
    const btn = document.getElementById('install-now-btn');
    if (btn) {
        btn.onclick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-modal').style.display = 'none';
                deferredPrompt = null;
            } else {
                alert('Thiết bị iOS/Trình duyệt ẩn: Vui lòng bấm CHIA SẺ -> THÊM VÀO MÀN HÌNH CHÍNH thủ công!');
                dismissInstall();
            }
        };
    }
}

function initApp() {
    // Canvas WebGL đánh thức GPU ngầm
    try { document.createElement('canvas').getContext('webgl', { powerPreference: "high-performance" }); } catch(e){}
    
    document.getElementById('device-details').innerHTML = `Hệ điều hành: Tự động phân tích<br>Chuẩn đồ họa: ${window.devicePixelRatio * 160} DPI`;
    renderToggles();
    checkProStatus();
    updateProUI();
    document.getElementById('device-id-display').textContent = generateDeviceId();
    setupInstallButton();
}

// AUTO LOGIN
window.onload = function() {
    if (localStorage.getItem('app_unlocked') === 'true') {
        document.getElementById('install-modal').style.display = 'none';
        document.getElementById('login-app').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        initApp();
    } else {
        document.getElementById('install-modal').style.display = 'flex'; // Hiện mời tải App trước
    }
};
