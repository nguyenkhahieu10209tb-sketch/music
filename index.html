 <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Độ Nhạy Chuẩn</title>
    <style>
        body { font-family: -apple-system, Arial, sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .btn { display: inline-block; padding: 15px 35px; background: #00adb5; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(0,173,181,0.4); }
        #app-screen { display: none; text-align: center; padding: 20px; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; }
        .welcome-btn { padding: 20px 40px; background: #ff4757; color: white; font-size: 22px; font-weight: bold; border-radius: 50px; box-shadow: 0 4px 20px rgba(255,71,87,0.5); }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="welcome-btn">CHẠM ĐỂ VÀO APP</div>
        <p style="font-size: 14px; color: #aaa; margin-top: 15px;">(Bắt buộc chạm để kích hoạt hệ thống)</p>
    </div>

    <div id="app-screen">
        <h1 style="color: #00adb5; font-size: 28px; margin-bottom: 10px;">ĐỘ NHẠY CHUẨN</h1>
        <p style="color: #ccc; font-size: 16px;">Ứng dụng lối tắt màn hình chính.</p>
        <button class="btn" id="install-btn">CÀI ĐẶT APP RA MÀN HÌNH</button>
        <p id="instruction" style="font-size: 14px; color: #ffeb3b; display:none; margin-top: 20px;">
            Đã tải xong! Vào <b>Cài đặt</b> > <b>Đã tải về hồ sơ</b> để hoàn tất cài đặt.
        </p>
    </div>

    <audio id="bg-music" loop>
        <source src="ScreenRecording_07-02-2026 21-47-57_1 (online-audio-converter.com) 2.mp3" type="audio/mpeg">
    </audio>

    <script>
        const startScreen = document.getElementById('start-screen');
        const appScreen = document.getElementById('app-screen');
        const audio = document.getElementById('bg-music');
        const installBtn = document.getElementById('install-btn');
        
        startScreen.addEventListener('click', () => {
            audio.play().catch(e => console.log("Lỗi nhạc:", e));
            startScreen.style.display = 'none';
            appScreen.style.display = 'block';
        });

        installBtn.addEventListener('click', () => {
            window.location.href = './app.mobileconfig';
            document.getElementById('instruction').style.display = 'block';
        });
    </script>
</body>
</html>
